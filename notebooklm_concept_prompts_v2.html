<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM 컨셉 인포그래픽 프롬프트 v2.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #080810;
    --surface: #10101e;
    --surface2: #18182e;
    --border: #252540;
    --text: #eeeef8;
    --text2: #7777a0;

    --a-color: #ff6b35;
    --b-color: #00c9ff;
    --c-color: #7cff6b;
    --d-color: #ff6bce;
    --e-color: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 60px;
  }

  /* ─── HEADER ─── */
  .header {
    max-width: 980px;
    margin: 0 auto 36px;
    text-align: center;
  }
  .version-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg,#ff6b35,#ff6bce);
    color:#fff; font-family:'Space Mono',monospace;
    font-size:11px; letter-spacing:2px;
    padding:5px 16px; border-radius:20px; margin-bottom:14px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 64px);
    letter-spacing: 3px;
    background: linear-gradient(135deg,#ff6b35 0%,#ff6bce 40%,#00c9ff 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .sub { color: var(--text2); font-size:13px; line-height:1.8; }

  /* ─── CONCEPT LEGEND ─── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin: 24px auto 32px;
    max-width: 900px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px; font-size: 12px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ─── SEARCH ─── */
  .search-wrap {
    max-width: 580px; margin: 0 auto 28px; position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 13px 20px 13px 50px;
    color: var(--text); font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: #ff6bce; }
  .search-wrap .si { position: absolute; left: 18px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:17px; }

  /* ─── TABS ─── */
  .tabs {
    display: flex; gap: 8px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 24px; max-width: 980px;
    margin-left: auto; margin-right: auto;
  }
  .tab-btn {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text2); cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 9px 20px; transition: all .2s; white-space: nowrap;
    position: relative; overflow: hidden;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active-a { border-color: var(--a-color); color: var(--a-color); background: rgba(255,107,53,.08); }
  .tab-btn.active-b { border-color: var(--b-color); color: var(--b-color); background: rgba(0,201,255,.08); }
  .tab-btn.active-c { border-color: var(--c-color); color: var(--c-color); background: rgba(124,255,107,.08); }
  .tab-btn.active-d { border-color: var(--d-color); color: var(--d-color); background: rgba(255,107,206,.08); }
  .tab-btn.active-e { border-color: var(--e-color); color: var(--e-color); background: rgba(255,215,0,.08); }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 980px; margin: 0 auto 16px; padding: 0 4px;
    flex-wrap: wrap; gap: 10px;
  }
  .count-info { color: var(--text2); font-family: 'Space Mono', monospace; font-size: 12px; }
  .count-info b { color: #fff; }
  .copy-all-btn {
    border: none; border-radius: 8px; color: #000;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 700; padding: 9px 20px;
    transition: opacity .2s, transform .1s;
  }
  .copy-all-btn:hover { opacity: .88; transform: scale(1.02); }
  .copy-all-btn:active { transform: scale(.97); }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px; max-width: 980px; margin: 0 auto;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px; cursor: pointer;
    transition: all .18s; display: flex; align-items: flex-start; gap: 12px;
    position: relative;
  }
  .card:hover { background: var(--surface2); transform: translateY(-1px); }

  .card-accent { width: 3px; flex-shrink: 0; border-radius: 4px; align-self: stretch; }

  .num { font-family:'Space Mono',monospace; font-size:10px; color:var(--text2); min-width:26px; padding-top:2px; flex-shrink:0; }

  .card-body { flex:1; }
  .concept-tag {
    display: inline-block; font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; padding: 2px 7px;
    border-radius: 4px; margin-bottom: 6px; opacity: .85;
  }
  .card-text { font-size: 13px; line-height: 1.65; color: var(--text); }
  .copy-ic { font-size: 13px; color: var(--text2); flex-shrink: 0; opacity: 0; transition: opacity .2s; }
  .card:hover .copy-ic { opacity: 1; }
  .copy-ic.done { color: #7cff6b; opacity: 1; }

  .no-results { text-align:center; color:var(--text2); padding:60px 0; font-size:14px; grid-column:1/-1; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(90px);
    color: #000; padding: 10px 28px; border-radius: 999px;
    font-size: 13px; font-weight: 700; transition: transform .3s;
    z-index: 9999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="version-tag">🎬 CREATIVE SLIDE DECK GENERATOR v2.0 × NOTEBOOKLM</div>
  <h1>CONCEPT INFOGRAPHIC PROMPTS</h1>
  <p class="sub">5개 크리에이티브 컨셉 × 100개 상세 프롬프트 — 아티스트 레퍼런스 + 비주얼 디렉션 내장<br>클릭하면 클립보드에 복사됩니다</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--a-color)"></div><b style="color:var(--a-color)">A</b> Brand Film — 영감·열망</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--b-color)"></div><b style="color:var(--b-color)">B</b> Documentary — 충격·긴장</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-color)"></div><b style="color:var(--c-color)">C</b> RPG Quest — 몰입·성취</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--d-color)"></div><b style="color:var(--d-color)">D</b> Magazine — 욕망·트렌드</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--e-color)"></div><b style="color:var(--e-color)">E</b> Classified — 호기심·긴박</div>
</div>

<div class="search-wrap">
  <span class="si">🔍</span>
  <input type="text" id="searchInput" placeholder="키워드 검색 (아티스트, 개념, 스타일...)" oninput="filterPrompts()">
</div>

<div class="tabs" id="tabsContainer"></div>

<div class="toolbar">
  <div class="count-info" id="countInfo"></div>
  <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()">📋 현재 탭 전체 복사</button>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
const CONCEPTS = {
  "A: Brand Film 🎬": {
    color: "#ff6b35",
    bg: "rgba(255,107,53,.12)",
    tag: "BRAND FILM",
    btnClass: "active-a",
    data: [
      "핵심 혁신 1개를 Luis Barragan의 강렬한 단색 벽면 구도로 표현 — '멈춤이 가장 빠른 길이었다' 역설 헤드라인, 딥 마젠타 배경, 단일 오브제 클로즈업, 정적 긴장감",
      "브랜드 미션을 Carlo Scarpa의 물-돌 대비 미장센으로 시각화 — 거친 콘크리트와 유리의 충돌, 한 줄기 빛이 진실을 가리키는 연출, '달라야 한다' 카피",
      "제품 차별성을 Herzog & de Meuron의 외피 텍스처처럼 레이어드 — '표면 아래에 답이 있다' 은유, 단면 노출 단면도 인포그래픽, 블랙+골드 투톤",
      "핵심 가치 3개를 Lina Bo Bardi의 콘크리트 미니멀리즘으로 배치 — 서스펜디드 요소, 인더스트리얼 무드, '무게 없는 혁신' 헤드라인 방향",
      "성장 스토리를 Glenn Murcutt의 자연-인공 이분법으로 시각화 — 로컬리즘과 유니버설리즘의 교차, 광활한 여백 속 단 하나의 숫자 강조",
      "서비스 여정을 Jorn Utzon의 쉘 구조처럼 펼쳐지는 곡선 인포그래픽으로 표현 — 오페라하우스 기하학, '한 번도 보지 못한 방식으로' 서브카피",
      "핵심 데이터 포인트를 John Lautner의 유기적 건축 구조처럼 흐르는 형태로 시각화 — 캔틸레버 캔버스, 중력에 맞서는 혁신 은유",
      "비전 선언문을 Eduardo Souto Moura의 돌+현대성 대비로 표현 — '오래된 것의 새로운 언어', 역사와 미래 사이의 단 하나의 문",
      "로드맵을 Rafael Moneo의 도시 맥락주의로 시각화 — 기존 질서 안의 새로운 질서, 격자 위의 벗어남, '규칙을 알아야 깰 수 있다'",
      "팀 역량을 George Nakashima의 자연목 결 감성으로 표현 — 각자의 나이테, 불완전한 아름다움, '결이 다를수록 더 강하다' 카피",
      "혁신 제품을 Raymond Loewy의 산업 디자인 미학으로 시각화 — 공기역학 실루엣, 하이라이트 한 줄, 꿀렸다가 터지는 여백",
      "브랜드 아이덴티티를 Josef Müller-Brockmann의 그리드 시스템으로 구조화 — 수학적 조화, '정밀함이 감동이다' 헤드라인",
      "고객 전환 순간을 Sebastião Salgado 사진 무드로 드라마화 — 흑백 대비, 얼굴 없는 군중, 하나의 빛을 향하는 시선",
      "핵심 메시지를 Dieter Rams의 10 원칙 미니멀리즘으로 시각화 — '좋은 디자인은 가능한 한 적은 디자인이다', 화이트 스페이스 90%",
      "결과 데이터를 Gio Ponti의 이탈리아 모더니즘 감성으로 표현 — 따뜻한 기하학, 인간적 스케일, 숫자가 시가 되는 레이아웃",
      "브랜드 철학을 Andrea Palladio의 대칭+비례 미학으로 구조화 — 황금비 레이아웃, '완벽한 균형이 가장 인간적이다' 카피",
      "서비스 핵심을 Axel Vervoordt의 와비-루스트 미학으로 표현 — 불완전한 아름다움, 시간의 흔적, '덜어낼수록 더해진다'",
      "핵심 지표를 Poul Kjaerholm의 스틸+가죽 미니멀로 시각화 — 정제된 산업성, '정직한 소재처럼 정직한 데이터' 방향",
      "기술 혁신을 Pierre Jeanneret의 인도 모더니즘 감성으로 표현 — 지역성과 보편성의 충돌, 인간 스케일의 혁신",
      "비전 타임라인을 Fumihiko Maki의 그룹 폼 이론으로 시각화 — 개별이 모여 전체를 이루는 시퀀스, '점이 선이 되고 선이 세계가 된다'",
      "경쟁 우위를 Rudolf Olgiati의 순수 형태론으로 표현 — 불필요한 것을 모두 제거한 본질, '이것만 남았다' 헤드라인",
      "사용자 임팩트를 Ken Domon의 다큐멘터리 사진 감성으로 드라마화 — 있는 그대로의 진실, 조작 없는 순간의 힘",
      "조직 문화를 Pierre Paulin의 유기적 가구 형태로 시각화 — 경계 없는 연결, 흐름의 인체공학, '사람처럼 구부러지는 조직'",
      "ROI 데이터를 Shigeo Fukuda의 착시 그래픽으로 표현 — 보는 각도에 따라 달라지는 진실, '숫자도 관점이다'",
      "제품 사용 경험을 Yusaku Kamekura의 올림픽 포스터 감성으로 표현 — 단순한 형태의 폭발적 에너지, 원색 대비",
      "성장 곡선을 Finn Juhl의 조각적 가구 미학으로 표현 — 유기적 볼륨, '성장에도 형태가 있다' 시각화",
      "혁신 생태계를 Herman Miller의 워크플레이스 시스템으로 시각화 — 연결된 개인, 시스템이 개인을 지원하는 방향성",
      "브랜드 약속을 Piero Fornasetti의 초현실 오브제로 표현 — 친숙한 것을 낯설게, '약속은 예상치 못한 방식으로 지켜진다'",
      "사용자 여정을 Jonathan Adler의 낙관적 모더니즘으로 표현 — 즐거운 형태, 유머 있는 기능성, '당연한 것을 즐거움으로'",
      "핵심 통찰을 Ladislav Sutnar의 정보 디자인 혁명으로 시각화 — 복잡성의 단순화, '이해가 되는 순간의 아름다움'",
      "마일스톤을 Alessandro Mendini의 포스트모던 유머로 표현 — 진지함과 유희의 공존, 알록달록한 진실",
      "팀 역할을 Florence Knoll의 모더니스트 인테리어로 배치 — 기능이 형태를 결정한다, 각자의 자리가 전체를 완성",
      "결과 임팩트를 Orla Kiely의 레트로 패턴으로 표현 — 반복에서 나오는 의미, 패턴이 된 성과",
      "제품 로드맵을 Ronan & Erwan Bouroullec의 클라우드 시스템으로 시각화 — 유연한 모듈, 연결의 가능성, '계획은 살아있다'",

      "제품 임팩트를 Roberto Burle Marx의 풍경 추상화로 표현 — 흘러가는 형태, 조감도 시점, 자연처럼 자연스러운 혁신",
      "사용자 데이터를 Anni Albers의 위빙 텍스타일 패턴으로 시각화 — 씨실과 날실처럼 교차하는 데이터 포인트",
      "전략 방향을 Naum Gabo의 구성주의로 표현 — 투명한 구조체, '보이는 것이 전부가 아니다', 내부 골격의 아름다움",
      "파트너십을 Marcel Breuer의 Bauhaus 공동작업 감성으로 시각화 — '함께 만드는 것이 더 강하다', 용접된 연결",
      "서비스 혁신을 Ettore Sottsass의 Memphis 스타일로 표현 — 컬러의 반란, 유쾌한 파격, '규칙 밖에서 답이 나온다'",
      "성과 선언을 Konstantin Grcic의 산업적 아름다움으로 표현 — '기능이 감동이 될 때', 날카로운 라인의 성취감",

const CATEGORIES = Object.keys(CONCEPTS);
let activeTab = CATEGORIES[0];
let searchTerm = '';

const COLORS = {
  "A: Brand Film 🎬": "#ff6b35",
  "B: Documentary 🎥": "#00c9ff",
  "C: RPG Quest 🎮": "#7cff6b",
  "D: Magazine 📰": "#ff6bce",
  "E: Classified 🔒": "#ffd700"
};

function renderTabs() {
  const c = document.getElementById('tabsContainer');
  c.innerHTML = CATEGORIES.map(cat => {
    const conf = CONCEPTS[cat];
    const isActive = cat === activeTab;
    return `<button class="tab-btn ${isActive ? conf.btnClass : ''}" onclick="setTab('${cat.replace(/'/g,"\\'")}')">
      ${cat}
    </button>`;
  }).join('');
}

function setTab(cat) {
  activeTab = cat;
  searchTerm = document.getElementById('searchInput').value.trim();
  renderTabs();
  renderGrid();
  // update copy btn color
  const conf = CONCEPTS[cat];
  const btn = document.getElementById('copyAllBtn');
  btn.style.background = conf.color;
}

function filterPrompts() {
  searchTerm = document.getElementById('searchInput').value.trim();
  renderGrid();
}

function renderGrid() {
  const conf = CONCEPTS[activeTab];
  const items = conf.data;
  const filtered = searchTerm
    ? items.filter(p => p.toLowerCase().includes(searchTerm.toLowerCase()))
    : items;

  document.getElementById('countInfo').innerHTML = `<b>${filtered.length}</b> / ${items.length}개 표시`;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">🔍 검색 결과가 없습니다. 다른 키워드를 시도해보세요.</div>';
    return;
  }
  grid.innerHTML = filtered.map((text, i) => `
    <div class="card" onclick="copyItem(this, '${text.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', ${i})" style="border-color:rgba(${hexToRgb(conf.color)},0.15)">
      <div class="card-accent" style="background:${conf.color}; opacity:0.6"></div>
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <div class="card-body">
        <div class="concept-tag" style="background:rgba(${hexToRgb(conf.color)},0.15);color:${conf.color}">${conf.tag}</div>
        <div class="card-text">${text}</div>
      </div>
      <span class="copy-ic" id="ic-${i}">📋</span>
    </div>
  `).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function copyItem(el, text, i) {
  const clean = text.replace(/&quot;/g,'"');
  navigator.clipboard.writeText(clean).then(() => {
    el.style.borderColor = COLORS[activeTab];
    const ic = document.getElementById(`ic-${i}`);
    if (ic) { ic.textContent = '✅'; ic.classList.add('done'); }
    setTimeout(() => {
      el.style.borderColor = '';
      if (ic) { ic.textContent = '📋'; ic.classList.remove('done'); }
    }, 1500);
    showToast('클립보드에 복사됨!');
  });
}

function copyAll() {
  const conf = CONCEPTS[activeTab];
  const items = conf.data;
  const filtered = searchTerm ? items.filter(p => p.toLowerCase().includes(searchTerm.toLowerCase())) : items;
  navigator.clipboard.writeText(filtered.join('\n\n')).then(() => {
    showToast(`${filtered.length}개 프롬프트 전체 복사 완료!`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  const conf = CONCEPTS[activeTab];
  t.style.background = conf.color;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
setTab(CATEGORIES[0]);
renderTabs();
